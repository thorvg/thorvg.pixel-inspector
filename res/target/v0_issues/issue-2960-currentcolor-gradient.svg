<svg xmlns="http://www.w3.org/2000/svg" width="100" height="80" viewBox="0 0 100 80" color="#e8521f">
  <!-- issue #2960: `currentColor` inside a gradient stop was not resolved.
       v0: stop fell back to black/default. v1.0.0+: resolves to inherited
       `color` (#e8521f) -> orange->blue gradient. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="100" y2="0">
      <stop offset="0" stop-color="currentColor"/>
      <stop offset="1" stop-color="#1e88e5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="80" fill="url(#g)"/>
</svg>
