<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="100" viewBox="0 0 100 100">
  <!-- issue #3615: nested <use> nodes (a <use> referencing a group that itself
       contains <use>) were not rendered (complex Godot SVGs). v1.0.0+ resolves
       the nested references. -->
  <defs>
    <rect id="r" width="18" height="18" rx="3" fill="#e8521f"/>
    <g id="pair">
      <use xlink:href="#r" x="0" y="0"/>
      <use xlink:href="#r" x="24" y="0" fill="#1e88e5"/>
    </g>
  </defs>
  <rect x="0" y="0" width="100" height="100" fill="#f5f5f5"/>
  <use xlink:href="#pair" x="14" y="14"/>
  <use xlink:href="#pair" x="14" y="44"/>
  <use xlink:href="#pair" x="14" y="74"/>
</svg>
