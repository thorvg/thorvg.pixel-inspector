<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- issue #2095 (feature): support CSS `style` class sets (.class selectors).
       v0: class-based fill/stroke not applied -> shapes fell back to default
       (black). v1.0.0+: resolves the <style> classes. -->
  <style>
    .accent { fill: #e8521f; }
    .ring   { fill: #fdd835; stroke: #1e88e5; stroke-width: 6; }
  </style>
  <rect x="0" y="0" width="100" height="100" fill="#f5f5f5"/>
  <rect class="accent" x="12" y="12" width="38" height="38" rx="6"/>
  <circle class="ring" cx="64" cy="64" r="26"/>
</svg>
