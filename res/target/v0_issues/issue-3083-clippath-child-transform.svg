<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- issue #3083: transform on a clipPath's CHILD was ignored.
       v0: clip stayed axis-aligned. v1.0.0+: the child's rotate is applied,
       so the blue shows through a rotated square. -->
  <defs>
    <clipPath id="c">
      <rect x="28" y="28" width="44" height="44" transform="rotate(25 50 50)"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="100" height="100" fill="#f0f0f0"/>
  <circle cx="50" cy="50" r="46" fill="#1e88ff" clip-path="url(#c)"/>
</svg>
